<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Study Log</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #222;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 15px;
    }

    .container {
      max-width: 800px;
      margin: 20px auto;
      padding: 0 15px;
    }

    .post {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    input {
      display: block;
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }

    button {
      padding: 8px 12px;
      background: #222;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <div>Study Log</div>
  <nav>
    <a href="#" onclick="showPage('home')">Home</a>
    <a href="#" onclick="showPage('login')">Login</a>
  </nav>
</header>

<div class="container">

  <!-- HOME -->
  <div id="home">
    <div class="post" onclick="showDetail('글 제목', '내용입니다')">
      <h3>글 제목</h3>
      <p>간단한 내용</p>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="login" class="hidden">
    <h2>Login</h2>
    <input type="text" placeholder="아이디">
    <input type="password" placeholder="비밀번호">
    <button onclick="alert('로그인 기능은 아직 구현 전')">로그인</button>
  </div>

  <!-- DETAIL -->
  <div id="detail" class="hidden">
    <h2 id="detail-title"></h2>
    <p id="detail-content"></p>
    <button onclick="showPage('home')">뒤로가기</button>
  </div>

</div>

<script>
  function showPage(page) {
    document.getElementById('home').classList.add('hidden');
    document.getElementById('login').classList.add('hidden');
    document.getElementById('detail').classList.add('hidden');

    document.getElementById(page).classList.remove('hidden');
  }

  function showDetail(title, content) {
    document.getElementById('detail-title').innerText = title;
    document.getElementById('detail-content').innerText = content;
    showPage('detail');
  }
</script>

</body>
</html>
