<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Log | Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #333;       /* 무난한 다크 그레이 */
      --bg: #ffffff;         /* 기본 흰색 배경 */
      --text: #222222;       /* 기본 텍스트색 */
      --card-bg: #ffffff;
      --border: #eeeeee;     /* 아주 연한 테두리 */
      --tag-bg: #f5f5f5;
    }

    body {
      margin: 0;
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    /* 네비게이션 바 (가장 표준적인 형태) */
    header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 10%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
    }

    nav a {
      color: #555;
      text-decoration: none;
      font-weight: 400;
      margin-left: 1.5rem;
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--primary); }

    .container {
      max-width: 960px;
      margin: 60px auto;
      padding: 0 20px;
    }

    /* 히어로 섹션 (소개글 최소화) */
    .hero {
      text-align: center;
      margin-bottom: 70px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 50px;
    }
    .hero h1 { font-size: 2.2rem; margin-bottom: 15px; font-weight: 700; }
    .hero p { color: #777; font-size: 1rem; max-width: 600px; margin: 0 auto; }

    /* 표준 카드형 레이아웃 (Grid) */
    .post-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
    }

    .post {
      background: var(--card-bg);
      padding: 28px;
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .post:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.03);
    }

    .post h3 { margin: 10px 0; font-size: 1.35rem; font-weight: 500; line-height: 1.4; }
    .post p { color: #666; font-size: 0.95rem; margin-bottom: 0; flex-grow: 1; }
    
    /* 태그 디자인 (회색조) */
    .tag {
      display: inline-block;
      background: var(--tag-bg);
      color: #555;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
      margin-bottom: 5px;
      align-self: flex-start;
    }

    .hidden { display: none; }

    /* 상세 페이지 디자인 (담백하게) */
    #detail {
      background: white;
      padding: 20px 0;
    }
    #detail-title { font-size: 2.5rem; margin-bottom: 30px; font-weight: 700; line-height: 1.3; }
    #detail-content { font-size: 1.05rem; color: #333; white-space: pre-wrap; letter-spacing: -0.2px; }

    /* 버튼 스타일 (기본 그레이) */
    .btn {
      padding: 12px 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .btn:hover { background: #000; }

    /* 로그인 폼 (기본 형태) */
    .login-box {
      background: white;
      padding: 50px;
      border-radius: 8px;
      max-width: 360px;
      margin: 80px auto;
      border: 1px solid var(--border);
      box-shadow: 0 4px 15px rgba(0,0,0,0.02);
    }
    .login-box h2 { text-align: center; margin-bottom: 30px; font-weight: 700; }
    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border: 1px solid var(--border);
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 0.95rem;
    }
    input:focus { outline: 1px solid var(--primary); border-color: var(--primary); }

    /* 모바일 대응 (반응형) */
    @media (max-width: 768px) {
      header { padding: 1rem 5%; }
      .container { margin: 40px auto; }
      .hero h1 { font-size: 1.8rem; }
      #detail-title { font-size: 2rem; }
    }
  </style>
</head>

<body>

<header>
  <a href="#" class="logo" onclick="showPage('home')">Dev Archive</a>
  <nav>
    <a href="#" onclick="showPage('home')">Home</a>
    <a href="#" onclick="showPage('login')">Login</a>
  </nav>
</header>

<div class="container">

  <div id="home">
    <div class="hero">
      <h1>학습 및 프로젝트 기록</h1>
      <p>개발 과정에서 배운 점들을 정리하여 저장하는 공간입니다.</p>
    </div>

    <div class="post-grid">
      <div class="post" onclick="location.href='analysis.html'">
        <span class="tag">Career</span>
        <h3>직무 분석 및 역량 정리</h3>
        <p>목표 직무에 필요한 역량 분석과 나의 성장 계획</p>
      </div>

      <div class="post" onclick="showDetail('프로젝트 결과 및 회고', '이번 프로젝트의 진행 과정, 기술적인 도전, 그리고 배운 점들을 정리한 회고록입니다.\n\n[예시 내용]\n프로젝트의 주요 기능 구현 방법과 발생했던 에러를 해결하는 과정에서 배운 점을 기록했습니다.')">
        <span class="tag">Project</span>
        <h3>프로젝트 결과 및 회고</h3>
        <p>프로젝트 진행 과정과 주요 결과물, 학습한 점 정리</p>
      </div>
    </div>
  </div>

  <div id="login" class="hidden">
    <div class="login-box">
      <h2>관리자 로그인</h2>
      <input type="text" placeholder="아이디">
      <input type="password" placeholder="비밀번호">
      <button class="btn" style="width:100%" onclick="alert('로그인 기능은 아직 구현 전입니다.')">로그인</button>
    </div>
  </div>

  <div id="detail" class="hidden">
    <h2 id="detail-title"></h2>
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">
    <div id="detail-content"></div>
    <hr style="margin: 40px 0; border: 0; border-top: 1px solid var(--border);">
    <button class="btn" onclick="showPage('home')">← 목록으로 돌아가기</button>
  </div>

</div>

<script>
  function showPage(page) {
    // 모든 페이지 숨기기
    document.getElementById('home').classList.add('hidden');
    document.getElementById('login').classList.add('hidden');
    document.getElementById('detail').classList.add('hidden');

    // 선택한 페이지 보여주기
    document.getElementById(page).classList.remove('hidden');
    window.scrollTo(0, 0); // 페이지 상단으로 스크롤 이동
  }

  function showDetail(title, content) {
    // 상세 페이지에 제목과 내용 주입
    document.getElementById('detail-title').innerText = title;
    document.getElementById('detail-content').innerText = content;
    showPage('detail'); // 상세 페이지 보여주기
  }
</script>

</body>
</html>
